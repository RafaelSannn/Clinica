<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Cadastro de Paciente</h2>
    <form th:action="@{/pacientes/salvar}" th:method="${paciente.id == 0} ? 'post' : 'put'" th:object="${paciente}">

        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label for="nome" class="form-label">Nome Completo</label>
            <input type="text" class="form-control" th:field="*{nome}" required>
        </div>

        <div class="mb-3">
            <label for="data_nascimento" class="form-label">Data de Nascimento</label>
            <input type="date" class="form-control" th:field="*{data_nascimento}" required>
        </div>

        <div class="mb-3">
            <label for="sexo" class="form-label">Sexo</label>
            <select class="form-select" th:field="*{sexo}">
                <option value="F">Feminino</option>
                <option value="M">Masculino</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/pacientes/listar" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
