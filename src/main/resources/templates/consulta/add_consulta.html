<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Consulta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <h2>Registrar Consulta</h2>

    <form th:action="@{/consultas/salvar}" method="post" th:object="${consulta}">
        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label for="paciente" class="form-label">Paciente</label>
            <select class="form-select select2-paciente" id="paciente" th:field="*{paciente}" required>
                <option value="">Selecione um paciente</option>
                <option th:if="*{paciente != null}" th:value="*{paciente.id}" th:text="*{paciente.nome}" selected></option>
            </select>
        </div>

        <div class="mb-3">
            <label for="especialidade" class="form-label">Especialidade</label>
            <select class="form-select" id="especialidade" name="especialidade" required>
                <option value="">Selecione uma especialidade</option>
                <option th:each="esp : ${especialidades}" th:value="${esp}" th:text="${esp}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label for="medico" class="form-label">Médico</label>
            <select class="form-select" id="medico" th:field="*{medico}" required disabled>
                <option value="">Selecione um médico</option>
                <option th:if="*{medico != null}" th:value="*{medico.id}" th:text="*{medico.nome}" selected></option>
            </select>
        </div>

        <div class="mb-3">
            <label for="data_consulta">Data e Hora da Consulta</label>
            <input type="datetime-local" class="form-control" id="data_consulta" th:field="*{data_consulta}" required />
        </div>

        <div class="mb-3">
            <label for="sintomas" class="form-label">Sintomas</label>
            <textarea class="form-control" th:field="*{sintomas}" rows="3" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
        <a th:href="@{/consultas/listar}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

<script>
    $(document).ready(function() {
        if ($('#especialidade').val() || $('#medico').val()) {
            $('#medico').prop('disabled', false);
        }

        $('.select2-paciente').select2({
            placeholder: "Digite para buscar paciente...",
            minimumInputLength: 2,
            ajax: {
                url: '/consultas/pacientesPorNome',
                dataType: 'json',
                delay: 250,
                data: function (params) {
                    return { termo: params.term };
                },
                processResults: function (data) {
                    return {
                        results: $.map(data, function (item) {
                            return { id: item.id, text: item.nome };
                        })
                    };
                },
                cache: true
            }
        });

        $('#especialidade').change(function () {
            const especialidade = $(this).val();
            const medicoSelect = $('#medico');
            medicoSelect.empty().append('<option value="">Selecione um médico</option>');

            if (especialidade) {
                medicoSelect.prop('disabled', false);
                $.ajax({
                    url: '/consultas/medicosPorEspecialidade',
                    type: 'GET',
                    data: { especialidade: especialidade },
                    success: function (data) {
                        $.each(data, function (i, medico) {
                            medicoSelect.append(`<option value="${medico.id}">${medico.nome}</option>`);
                        });
                    }
                });
            } else {
                medicoSelect.prop('disabled', true);
            }
        });
    });
</script>
</body>
</html>
