<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listar Consultas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
    <h1>Clínica MCL</h1>
    <hr/>
    <div th:if="${consultas != null}">
        <h2>Consultas</h2>

        <table class="table table-bordered">
            <thead>
            <tr>
                <th>Paciente</th>
                <th>Especialidade</th>
                <th>Médico</th>
                <th>Data/Hora</th>
                <th>Ação</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="consulta : ${consultas}">
                <td th:text="${consulta.paciente.nome}">Paciente</td>
                <td th:text="${consulta.medico.especialidade}">Especialidade</td>
                <td th:text="${consulta.medico.nome}">Médico</td>
                <td th:text="${#temporals.format(consulta.data_consulta, 'dd/MM/yyyy HH:mm')}">Data/Hora</td>
                <td>
                    <a class="btn btn-sm btn-success"
                       th:href="@{/consultas/{id}/atender(id=${consulta.id})}">Atender</a>
                    <a class="btn btn-sm btn-info"
                       th:href="@{/consultas/{id}/atualizar(id=${consulta.id})}">Editar</a>
                    <a class="btn btn-sm btn-danger"
                       th:href="@{/consultas/{id}/remover(id=${consulta.id})}">Excluir</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <a class="btn btn-primary" th:href="@{/consultas/cadastro}">Agendar Nova Consulta</a>
</div>
</body>
</html>
