<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Atendimento Consulta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
    <h2>Atendimento ao Paciente</h2>

    <form>
        <div class="mb-3">
            <label>Médico</label>
            <input type="text" class="form-control" th:value="${consulta.medico.nome}" readonly>
        </div>
        <div class="mb-3">
            <label>Paciente</label>
            <input type="text" class="form-control" th:value="${consulta.paciente.nome}" readonly>
        </div>
        <div class="mb-3">
            <label>Especialidade</label>
            <input type="text" class="form-control" th:value="${consulta.medico.especialidade}" readonly>
        </div>
        <div class="mb-3">
            <label>Data/Hora da Consulta</label>
            <input type="text" class="form-control"
                   th:text="${#temporals.format(consulta.data_consulta, 'dd/MM/yyyy HH:mm')}" readonly>
        </div>
        <div class="mb-3">
            <label for="Sintomas">Sintomas</label>
            <textarea class="form-control" id="Sintomas" rows="3"
                      th:text="${consulta.sitomas}" readonly></textarea>
        </div>
        <div class="mb-3">
            <label for="Receita">Receita</label>
            <textarea class="form-control" id="Receita" rows="3"></textarea>
        </div>
        <div class="mb-3">
            <label for="AvaliacaoAtendimento">Avaliação do Atendimento (0 a 10)</label>
            <input type="number" class="form-control" id="AvaliacaoAtendimento"
                   step="0.01" min="0" max="10">
        </div>

        <button type="submit" class="btn btn-primary">Salvar Atendimento</button>
        <a href="/consultas/listar" class="btn btn-secondary">Voltar</a>
    </form>
</div>
</body>
</html>
