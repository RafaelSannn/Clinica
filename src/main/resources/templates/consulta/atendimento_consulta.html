<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Atendimento Consulta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
    <h2>Atendimento ao Paciente</h2>

    <form th:action="@{/consultas/atendimento/salvar}" th:object="${consulta}" method="post">

        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label>Médico</label>
            <input type="text" class="form-control" th:value="${consulta.medico.nome}" readonly disabled>
        </div>

        <div class="mb-3">
            <label>Paciente</label>
            <input type="text" class="form-control" th:value="${consulta.paciente.nome}" readonly disabled>
        </div>

        <div class="mb-3">
            <label>Especialidade</label>
            <input type="text" class="form-control" th:value="${consulta.medico.especialidade}" readonly disabled>
        </div>

        <div class="mb-3">
            <label>Data/Hora da Consulta</label>
            <input type="text" class="form-control"
                   th:value="${#temporals.format(consulta.data_consulta, 'dd/MM/yyyy HH:mm')}" readonly disabled>
        </div>

        <div class="mb-3">
            <label for="sintomas">Sintomas</label>
            <textarea class="form-control" id="sintomas" rows="3"
                      th:field="*{sintomas}" readonly></textarea>
        </div>

        <div class="mb-3">
            <label for="receita">Receita</label>
            <textarea class="form-control" id="receita" rows="3" th:field="*{receita}" required></textarea>
        </div>

        <div class="mb-3">
            <label for="avaliacao_atendimento">Avaliação do Atendimento (0 a 10)</label>
            <input type="number" class="form-control" id="avaliacao_atendimento"
                   th:field="*{avaliacao_atendimento}" step="0.01" min="0" max="10" required>
        </div>

        <button type="submit" class="btn btn-primary">Salvar Atendimento</button>
        <a th:href="@{/consultas/listar}" class="btn btn-secondary">Voltar</a>
    </form>
</div>
</body>
</html>
